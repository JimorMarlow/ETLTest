<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP Device - WiFi Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            color: #1C1C1E;
            padding: 16px;
        }

        body.large-font {
            font-size: 18px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #C6C6C8;
            margin-bottom: 20px;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1C1C1E;
        }

        .accessibility-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
        }

        .lang-btn, .font-btn {
            padding: 6px 12px;
            border: 1px solid #C6C6C8;
            border-radius: 6px;
            background: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .font-btn {
            font-weight: 700;
            line-height: 1;
        }

        .lang-btn.active, .font-btn.active {
            background: #007AFF;
            border-color: #007AFF;
            color: #FFFFFF;
        }

        .lang-btn:hover, .font-btn:hover {
            border-color: #007AFF;
        }

        /* Device Info Container */
        .device-info-container {
            background: #F2F2F7;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .device-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .device-icon svg {
            width: 100%;
            height: 100%;
        }

        .device-info-content {
            flex: 1;
            min-width: 0;
        }

        .device-name {
            font-size: 20px;
            font-weight: 700;
            color: #1C1C1E;
            margin-bottom: 4px;
        }

        .device-description {
            font-size: 15px;
            font-weight: 400;
            color: #8E8E93;
            line-height: 1.4;
        }

        body.large-font .device-name {
            font-size: 24px;
        }

        body.large-font .device-description {
            font-size: 18px;
        }

        /* Status section */
        .status-section {
            background: #F2F2F7;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.disconnected {
            background: #FF3B30;
        }

        .status-indicator.connecting {
            background: #FF9500;
            animation: pulse 1s infinite;
        }

        .status-indicator.connected {
            background: #34C759;
        }

        .status-indicator.error {
            background: #FF3B30;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            flex: 1;
            font-size: 15px;
            color: #1C1C1E;
        }

        .status-details {
            font-size: 13px;
            color: #8E8E93;
            margin-top: 4px;
        }

        body.large-font .status-text {
            font-size: 18px;
        }

        body.large-font .status-details {
            font-size: 15px;
        }

        .refresh-btn {
            padding: 8px 16px;
            border: 1px solid #007AFF;
            border-radius: 8px;
            background: #FFFFFF;
            color: #007AFF;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #007AFF;
            color: #FFFFFF;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Networks section */
        .section-title {
            font-size: 17px;
            font-weight: 600;
            color: #1C1C1E;
            margin-bottom: 12px;
        }

        body.large-font .section-title {
            font-size: 20px;
        }

        .networks-list {
            background: #F2F2F7;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .network-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #C6C6C8;
            cursor: pointer;
            transition: background 0.2s;
        }

        .network-item:last-child {
            border-bottom: none;
        }

        .network-item:hover {
            background: #E5E5EA;
        }

        .network-item.selected {
            background: #007AFF;
        }

        .network-item.selected .network-name,
        .network-item.selected .network-signal,
        .network-item.selected .network-lock {
            color: #FFFFFF;
        }

        .network-icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .network-info {
            flex: 1;
        }

        .network-name {
            font-size: 15px;
            font-weight: 500;
            color: #1C1C1E;
            margin-bottom: 4px;
        }

        .network-signal {
            font-size: 13px;
            color: #8E8E93;
        }

        body.large-font .network-name {
            font-size: 18px;
        }

        body.large-font .network-signal {
            font-size: 15px;
        }

        .network-lock-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }

        .network-lock {
            font-size: 14px;
            color: #8E8E93;
            line-height: 1;
        }

        .network-checkmark {
            font-size: 14px;
            color: #34C759;
            line-height: 1;
        }

        body.large-font .network-lock,
        body.large-font .network-checkmark {
            font-size: 16px;
        }

        /* Password section */
        .password-section {
            background: #F2F2F7;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8E8E93;
            margin-bottom: 6px;
        }

        body.large-font .input-label {
            font-size: 15px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #C6C6C8;
            border-radius: 8px;
            font-size: 15px;
            color: #1C1C1E;
            background: #FFFFFF;
            transition: border-color 0.2s;
        }

        body.large-font .input-field {
            height: 52px;
            font-size: 18px;
        }

        .input-field:focus {
            outline: none;
            border-color: #007AFF;
        }

        .input-field::placeholder {
            color: #C7C7CC;
        }

        .show-password-btn {
            position: absolute;
            right: 12px;
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: #007AFF;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        body.large-font .show-password-btn {
            font-size: 15px;
        }

        /* Selected Network Header */
        .selected-network-header {
            margin-bottom: 16px;
        }

        .selected-network-title {
            font-size: 17px;
            font-weight: 600;
            color: #1C1C1E;
            margin-bottom: 8px;
        }

        body.large-font .selected-network-title {
            font-size: 20px;
        }

        .selected-network-divider {
            height: 1px;
            background: #C6C6C8;
            margin-bottom: 16px;
        }

        /* Connection error message */
        .connection-error {
            background: #FF3B30;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .connection-error-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .connection-error-text {
            flex: 1;
            font-size: 14px;
            color: #FFFFFF;
            font-weight: 500;
        }

        body.large-font .connection-error-text {
            font-size: 16px;
        }

        .retry-btn {
            padding: 6px 12px;
            border: 1px solid #FFFFFF;
            border-radius: 6px;
            background: transparent;
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.large-font .retry-btn {
            font-size: 15px;
            padding: 8px 14px;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* AP Settings section */
        .ap-settings-section {
            background: #F2F2F7;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .ap-settings-title {
            font-size: 15px;
            font-weight: 600;
            color: #1C1C1E;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #C6C6C8;
        }

        body.large-font .ap-settings-title {
            font-size: 18px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        body.large-font .btn {
            height: 52px;
            font-size: 18px;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn-primary {
            background: #007AFF;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #0056CC;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #FFFFFF;
            color: #007AFF;
            border: 1px solid #007AFF;
        }

        .btn-secondary:hover {
            background: #007AFF;
            color: #FFFFFF;
        }

        .btn-danger {
            background: #FF3B30;
            color: #FFFFFF;
        }

        .btn-danger:hover {
            background: #D63026;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #FFFFFF;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #FFFFFF;
            border-radius: 14px;
            padding: 20px;
            max-width: 320px;
            width: 90%;
        }

        body.large-font .modal {
            padding: 24px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: #1C1C1E;
            margin-bottom: 12px;
        }

        body.large-font .modal-title {
            font-size: 20px;
        }

        .modal-message {
            font-size: 15px;
            color: #1C1C1E;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        body.large-font .modal-message {
            font-size: 18px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        body.large-font .modal-btn {
            height: 48px;
            font-size: 17px;
        }

        .modal-btn-cancel {
            background: #F2F2F7;
            color: #1C1C1E;
        }

        .modal-btn-confirm {
            background: #FF3B30;
            color: #FFFFFF;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .device-info-container {
                padding: 12px;
            }

            .device-icon {
                width: 40px;
                height: 40px;
            }

            .device-name {
                font-size: 18px;
            }

            .device-description {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title" data-i18n="title">WiFi Setup</div>
            <div class="accessibility-controls">
                <button class="font-btn" id="fontToggleBtn" data-i18n-title="Toggle font size" title="Toggle font size">A<span style="font-size: 0.7em; vertical-align: middle;">A</span></button>
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ru">RU</button>
                </div>
            </div>
        </div>

        <!-- Device Info Container -->
        <div class="device-info-container" id="deviceInfoContainer">
            <div class="device-icon" id="deviceIcon">
                <!-- Default smart home icon SVG -->
            </div>
            <div class="device-info-content">
                <div class="device-name" id="deviceName">ESP Device v1.0.0</div>
                <div class="device-description" id="deviceDescription">Smart home device based on ESP8266/ESP32</div>
            </div>
        </div>

        <!-- Status Section -->
        <div class="status-section">
            <div class="status-indicator disconnected" id="statusIndicator"></div>
            <div class="status-text">
                <div id="statusText" data-i18n="status_disconnected">Disconnected</div>
                <div class="status-details" id="statusDetails"></div>
            </div>
            <button class="refresh-btn" id="refreshBtn" data-i18n="refresh_btn">Refresh</button>
        </div>

        <!-- Networks Section -->
        <div class="section-title" data-i18n="select_network">Select Network</div>
        <div class="networks-list" id="networksList">
            <div class="network-item" style="justify-content: center; color: #8E8E93;">
                <span data-i18n="scan_networks">Scan networks to see available networks</span>
            </div>
        </div>

        <!-- Password Section -->
        <div class="password-section hidden" id="passwordSection">
            <div class="selected-network-header">
                <div class="selected-network-title" id="selectedNetworkTitle"></div>
                <div class="selected-network-divider"></div>
            </div>
            
            <!-- Connection Error Message -->
            <div class="connection-error hidden" id="connectionError">
                <span class="connection-error-icon">⚠️</span>
                <span class="connection-error-text" data-i18n="connection_failed">Connection failed. Check password.</span>
                <button class="retry-btn" id="retryBtn" data-i18n="retry_btn">Retry</button>
            </div>
            
            <div class="input-group" id="passwordInputGroup">
                <label class="input-label" data-i18n="password_label">Password</label>
                <div class="input-wrapper">
                    <input type="password" class="input-field" id="passwordInput" data-i18n-placeholder="password_placeholder" placeholder="Enter password">
                    <button type="button" class="show-password-btn" id="showPasswordBtn" data-i18n="show_password">Show</button>
                </div>
            </div>
            <button class="btn btn-primary" id="connectBtn" style="margin-top: 12px;" data-i18n="join_btn">
                Join
            </button>
        </div>

        <!-- AP Settings Section -->
        <div class="ap-settings-section">
            <div class="ap-settings-title" data-i18n="ap_settings_title">Access Point Settings</div>
            <div class="input-group">
                <label class="input-label" data-i18n="ap_ssid_label">AP SSID</label>
                <input type="text" class="input-field" id="apSsidInput" value="ESP_Device_AP">
            </div>
            <div class="input-group">
                <label class="input-label" data-i18n="ap_password_label">AP Password</label>
                <div class="input-wrapper">
                    <input type="password" class="input-field" id="apPasswordInput" value="password123">
                    <button type="button" class="show-password-btn" id="showApPasswordBtn" data-i18n="show_password">Show</button>
                </div>
            </div>
            <button class="btn btn-secondary" id="applyApSettingsBtn" style="margin-top: 12px;" data-i18n="apply_ap_settings_btn">
                Apply AP Settings
            </button>
        </div>

        <!-- Action Buttons -->
        <button class="btn btn-primary" id="saveRebootBtn" data-i18n="save_reboot_btn">Save & Reboot</button>
        <button class="btn btn-danger" id="factoryResetBtn" data-i18n="factory_reset_btn">Factory Reset</button>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Confirm</div>
            <div class="modal-message" id="modalMessage">Are you sure?</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="modalCancelBtn" data-i18n="cancel">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn" data-i18n="confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // Localization
        const translations = {
            en: {
                title: 'WiFi Setup',
                device_name: 'ESP Device v1.0.0',
                device_description: 'Smart home device based on ESP8266/ESP32',
                refresh_btn: 'Refresh',

                scan_networks: 'Scan networks to see available networks',
                selected_network: 'Selected Network',

                hide_password: 'Hide',
                join_btn: 'Join',

                ap_ssid_label: 'AP SSID',

                apply_ap_settings_btn: 'Apply AP Settings',
                save_reboot_btn: 'Save & Reboot',

                status_disconnected: 'Disconnected',
                status_connecting: 'Connecting...',
                status_connected: 'Connected',
                status_error: 'Connection Error',
                confirm_reset: 'Are you sure you want to reset to factory settings?',
                cancel: 'Cancel',
                confirm: 'Confirm',
                success_saved: 'Settings saved! Rebooting...',
                success_ap_applied: 'AP settings applied! Reconnecting...',
                error_connection: 'Connection failed. Check password.',
                error_no_network: 'Please select a network first.',
                error_timeout: 'Connection timeout. Try again.',
                no_networks: 'No networks found',
                signal_excellent: 'Excellent',
                signal_good: 'Good',
                signal_weak: 'Weak',
                signal_very_weak: 'Very Weak',
                retry_btn: 'Retry',
                connection_failed: 'Connection failed. Check password.'
            },
            ru: {
                title: 'Настройка WiFi',
                device_name: 'ESP Device v1.0.0',
                device_description: 'Устройство для умного дома на базе ESP8266/ESP32',
                refresh_btn: 'Обновить',
                select_network: 'Выберите сеть',
                scan_networks: 'Нажмите "Обновить" для поиска сетей',
                selected_network: 'Выбранная сеть',
                password_label: 'Пароль',
                password_placeholder: 'Введите пароль',
                show_password: 'Show',
                hide_password: 'Hide',
                join_btn: 'Join',
                disconnect_btn: 'Disconnect',
                connect_btn: 'Подключиться',
                connecting: 'Подключение...',
                ap_settings_title: 'Настройки точки доступа',
                ap_ssid_label: 'SSID точки доступа',
                ap_password_label: 'Пароль точки доступа',
                apply_ap_settings_btn: 'Применить настройки AP',
                save_reboot_btn: 'Запомнить и перезапустить',
                factory_reset_btn: 'Сброс настроек',
                status_disconnected: 'Не подключено',
                status_connecting: 'Подключение...',
                status_connected: 'Подключено',
                status_error: 'Ошибка подключения',
                confirm_reset: 'Вы уверены, что хотите сбросить настройки к заводским?',
                cancel: 'Отмена',
                confirm: 'Подтвердить',
                success_saved: 'Настройки сохранены! Перезагрузка...',
                success_ap_applied: 'Настройки AP применены! Переподключение...',
                error_connection: 'Ошибка подключения. Проверьте пароль.',
                error_no_network: 'Пожалуйста, выберите сеть.',
                error_timeout: 'Превышено время подключения. Попробуйте снова.',
                no_networks: 'Сети не найдены',
                signal_excellent: 'Отличный',
                signal_good: 'Хороший',
                signal_weak: 'Слабый',
                signal_very_weak: 'Очень слабый',
                retry_btn: 'Повторить',
                connection_failed: 'Ошибка подключения. Проверьте пароль.'
            }
        };

        // Default SVG icon for smart home device (from icon_smart_device2_mini.svg)
        const DEFAULT_DEVICE_ICON = `

        // State
        let currentLang = localStorage.getItem('wifiSetupLang') || 'en';
        let selectedNetwork = null;
        let networks = [];
        let isConnected = false;
        let connectionError = false;
        let largeFont = localStorage.getItem('wifiSetupLargeFont') === 'true';

        // Device configuration (can be overridden by actual device)
        window.deviceConfig = {
            version: 'ESP Device v1.0.0',
            description: 'Smart home device based on ESP8266/ESP32',
            iconSvg: null  // Custom SVG icon (optional)
        };

        // Simulation mode (set to false for production)
        const SIMULATION_MODE = true;

        // DOM Elements
        const deviceName = document.getElementById('deviceName');
        const deviceDescription = document.getElementById('deviceDescription');
        const deviceIcon = document.getElementById('deviceIcon');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const statusDetails = document.getElementById('statusDetails');
        const refreshBtn = document.getElementById('refreshBtn');
        const networksList = document.getElementById('networksList');
        const passwordSection = document.getElementById('passwordSection');
        const selectedNetworkTitle = document.getElementById('selectedNetworkTitle');
        const passwordInputGroup = document.getElementById('passwordInputGroup');
        const passwordInput = document.getElementById('passwordInput');
        const showPasswordBtn = document.getElementById('showPasswordBtn');
        const connectBtn = document.getElementById('connectBtn');
        const connectionErrorEl = document.getElementById('connectionError');
        const retryBtn = document.getElementById('retryBtn');
        const fontToggleBtn = document.getElementById('fontToggleBtn');
        const apSsidInput = document.getElementById('apSsidInput');
        const apPasswordInput = document.getElementById('apPasswordInput');
        const showApPasswordBtn = document.getElementById('showApPasswordBtn');
        const applyApSettingsBtn = document.getElementById('applyApSettingsBtn');
        const saveRebootBtn = document.getElementById('saveRebootBtn');
        const factoryResetBtn = document.getElementById('factoryResetBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        // Initialize
        function init() {
            applyDeviceConfig();
            setLanguage(currentLang);
            updateStatusUI();
            applyLargeFont();
            scanNetworks();
        }

        // Apply device configuration
        function applyDeviceConfig() {
            const config = window.deviceConfig || {};

            if (config.version) {
                deviceName.textContent = config.version;
            }

            if (config.description) {
                deviceDescription.textContent = config.description;
            }

            if (config.iconSvg && config.iconSvg.trim()) {
                deviceIcon.innerHTML = config.iconSvg;
            } else {
                deviceIcon.innerHTML = DEFAULT_DEVICE_ICON;
            }
        }

        // Apply large font setting
        function applyLargeFont() {
            if (largeFont) {
                document.body.classList.add('large-font');
                fontToggleBtn.classList.add('active');
            } else {
                document.body.classList.remove('large-font');
                fontToggleBtn.classList.remove('active');
            }
        }

        // Toggle large font
        function toggleLargeFont() {
            largeFont = !largeFont;
            localStorage.setItem('wifiSetupLargeFont', largeFont);
            applyLargeFont();
        }

        // Language
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('wifiSetupLang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });

            // Update device name and description from translations
            deviceName.textContent = translations[lang].device_name;
            deviceDescription.textContent = translations[lang].device_description;

            // Apply custom config if available
            const config = window.deviceConfig || {};
            if (config.version) {
                deviceName.textContent = config.version;
            }
            if (config.description) {
                deviceDescription.textContent = config.description;
            }

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });

            // Update connect button text
            updateConnectButtonText();
            
            // Update error message if visible
            if (connectionError) {
                showConnectionError();
            }
        }

        // Status
        function updateStatusUI() {
            statusIndicator.className = 'status-indicator disconnected';
            statusText.textContent = translations[currentLang].status_disconnected;
            statusDetails.textContent = '';
        }

        function setStatus(status, details = '') {
            statusIndicator.className = `status-indicator ${status}`;
            statusText.textContent = translations[currentLang][`status_${status}`] || status;
            statusDetails.textContent = details;
        }

        // Scan networks
        async function scanNetworks() {
            refreshBtn.disabled = true;
            networksList.innerHTML = '<div class="network-item" style="justify-content: center;"><span class="spinner"></span></div>';

            if (SIMULATION_MODE) {
                await new Promise(resolve => setTimeout(resolve, 800));
                networks = generateSimulatedNetworks();
                renderNetworks();
            } else {
                try {
                    const response = await fetch('/api/scan');
                    const data = await response.json();
                    networks = data.networks || [];
                    renderNetworks();
                } catch (error) {
                    networksList.innerHTML = `<div class="network-item" style="justify-content: center; color: #FF3B30;">Error: ${error.message}</div>`;
                }
            }

            refreshBtn.disabled = false;
        }

        // Generate simulated networks
        function generateSimulatedNetworks() {
            const baseNetworks = [
                { ssid: 'FIREFLY_HOME', rssi: -45, encryption: 'WPA2' },
                { ssid: 'FIREFLY_GUEST', rssi: -55, encryption: 'WPA2' },
                { ssid: 'FIREFLY_IOT', rssi: -65, encryption: 'WPA2' }
            ];

            return baseNetworks.map(net => ({
                ...net,
                rssi: net.rssi + Math.floor(Math.random() * 10) - 5,
                connected: false
            })).sort((a, b) => b.rssi - a.rssi);
        }

        // Render networks
        function renderNetworks() {
            if (networks.length === 0) {
                networksList.innerHTML = `<div class="network-item" style="justify-content: center; color: #8E8E93;">${translations[currentLang].no_networks}</div>`;
                return;
            }

            networksList.innerHTML = networks.map((network, index) => {
                const signalStrength = getSignalStrength(network.rssi);
                const signalText = translations[currentLang][`signal_${signalStrength}`] || signalStrength;
                const lockIcon = network.encryption === 'none' ? '🔓' : '🔒';
                const checkmark = network.connected ? '✅' : '';

                return `
                    <div class="network-item ${selectedNetwork === index ? 'selected' : ''}" data-index="${index}">
                        <span class="network-icon">📶</span>
                        <div class="network-info">
                            <div class="network-name">${escapeHtml(network.ssid)}</div>
                            <div class="network-signal">${signalText} • ${network.encryption === 'none' ? 'Open' : network.encryption}</div>
                        </div>
                        <div class="network-lock-wrapper">
                            ${checkmark ? `<span class="network-checkmark">${checkmark}</span>` : ''}
                            <span class="network-lock">${lockIcon}</span>
                        </div>
                    </div>
                `;
            }).join('');

            networksList.querySelectorAll('.network-item').forEach(item => {
                item.addEventListener('click', () => selectNetwork(parseInt(item.dataset.index)));
            });
        }

        // Get signal strength
        function getSignalStrength(rssi) {
            if (rssi >= -50) return 'excellent';
            if (rssi >= -60) return 'good';
            if (rssi >= -70) return 'weak';
            return 'very_weak';
        }

        // Select network
        function selectNetwork(index) {
            // Reset previous selection
            if (selectedNetwork !== null && networks[selectedNetwork]) {
                networks[selectedNetwork].connected = false;
            }

            // If clicking on already selected and connected network, show disconnect
            if (selectedNetwork === index && networks[index].connected) {
                selectedNetwork = index;
                renderNetworks();
                showPasswordSection(networks[index].ssid, true);
                return;
            }

            selectedNetwork = index;
            renderNetworks();
            showPasswordSection(networks[index].ssid, false);
        }

        // Show password section
        function showPasswordSection(ssid, isDisconnect = false) {
            passwordSection.classList.remove('hidden');
            selectedNetworkTitle.textContent = ssid;
            
            // Hide connection error when selecting new network
            hideConnectionError();

            if (isDisconnect) {
                passwordInputGroup.classList.add('hidden');
                connectBtn.textContent = translations[currentLang].disconnect_btn;
                connectBtn.className = 'btn btn-secondary';
            } else {
                passwordInputGroup.classList.remove('hidden');
                connectBtn.textContent = translations[currentLang].join_btn;
                connectBtn.className = 'btn btn-primary';
            }
        }

        // Show connection error
        function showConnectionError() {
            connectionErrorEl.classList.remove('hidden');
            const errorText = connectionErrorEl.querySelector('.connection-error-text');
            if (errorText) {
                errorText.textContent = translations[currentLang].connection_failed;
            }
            const retryBtn = connectionErrorEl.querySelector('.retry-btn');
            if (retryBtn) {
                retryBtn.textContent = translations[currentLang].retry_btn;
            }
        }

        // Hide connection error
        function hideConnectionError() {
            connectionErrorEl.classList.add('hidden');
            connectionError = false;
        }

        // Update connect button text
        function updateConnectButtonText() {
            if (selectedNetwork !== null && passwordSection.classList.contains('hidden') === false) {
                if (isConnected) {
                    connectBtn.textContent = translations[currentLang].disconnect_btn;
                    connectBtn.className = 'btn btn-secondary';
                } else {
                    connectBtn.textContent = translations[currentLang].join_btn;
                    connectBtn.className = 'btn btn-primary';
                }
            }
        }

        // Connect to network
        async function connectToNetwork() {
            if (selectedNetwork === null) {
                alert(translations[currentLang].error_no_network);
                return;
            }

            const network = networks[selectedNetwork];

            // Disconnect mode
            if (network.connected || isConnected) {
                network.connected = false;
                isConnected = false;
                setStatus('disconnected');
                passwordInputGroup.classList.remove('hidden');
                connectBtn.textContent = translations[currentLang].join_btn;
                connectBtn.className = 'btn btn-primary';
                renderNetworks();
                return;
            }

            const password = passwordInput.value;

            if (password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }

            connectBtn.disabled = true;
            connectBtn.innerHTML = '<span class="spinner"></span>' + translations[currentLang].connecting;
            setStatus('connecting');
            hideConnectionError();

            if (SIMULATION_MODE) {
                // Simulate connection failure for testing
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Simulate random failure for demo
                const simulateFailure = Math.random() < 0.3;
                if (simulateFailure) {
                    // Connection failed - server still responsive
                    connectionError = true;
                    showConnectionError();
                    setStatus('error', translations[currentLang].error_timeout);
                    connectBtn.disabled = false;
                    connectBtn.textContent = translations[currentLang].join_btn;
                    return;
                }
                
                // Success
                network.connected = true;
                isConnected = true;
                setStatus('connected', `${network.ssid} • 192.168.1.42`);
                renderNetworks();
                passwordInputGroup.classList.add('hidden');
                connectBtn.textContent = translations[currentLang].disconnect_btn;
                connectBtn.className = 'btn btn-secondary';
            } else {
                try {
                    const response = await fetch('/api/connect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ssid: network.ssid, password })
                    });
                    const data = await response.json();

                    if (data.success) {
                        network.connected = true;
                        isConnected = true;
                        setStatus('connected', `${network.ssid} • ${data.ip}`);
                        renderNetworks();
                        passwordInputGroup.classList.add('hidden');
                        connectBtn.textContent = translations[currentLang].disconnect_btn;
                        connectBtn.className = 'btn btn-secondary';
                    } else {
                        connectionError = true;
                        showConnectionError();
                        setStatus('error', translations[currentLang].error_connection);
                    }
                } catch (error) {
                    connectionError = true;
                    showConnectionError();
                    setStatus('error', translations[currentLang].error_timeout);
                }
            }

            connectBtn.disabled = false;
            connectBtn.textContent = isConnected ? translations[currentLang].disconnect_btn : translations[currentLang].join_btn;
        }

        // Retry connection
        function retryConnection() {
            hideConnectionError();
            passwordInput.focus();
            connectToNetwork();
        }

        // Show/hide password
        function togglePassword(input, btn) {
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.textContent = isPassword ? translations[currentLang].hide_password : translations[currentLang].show_password;
        }

        // Save and reboot
        async function saveAndReboot() {
            showModal(
                translations[currentLang].success_saved,
                async () => {
                    if (SIMULATION_MODE) {
                        document.body.innerHTML = `
                            <div class="container" style="text-align: center; padding-top: 100px;">
                                <div class="spinner" style="width: 48px; height: 48px; border-width: 4px; margin: 0 auto 20px;"></div>
                                <p style="font-size: 16px; color: #1C1C1E;">Rebooting...</p>
                            </div>
                        `;
                    } else {
                        try {
                            await fetch('/api/save', { method: 'POST' });
                            await fetch('/api/reset', { method: 'POST' });
                            
                            document.body.innerHTML = `
                                <div class="container" style="text-align: center; padding-top: 100px;">
                                    <div class="spinner" style="width: 48px; height: 48px; border-width: 4px; margin: 0 auto 20px;"></div>
                                    <p style="font-size: 16px; color: #1C1C1E;">Rebooting...</p>
                                </div>
                            `;
                        } catch (error) {
                            alert('Error: ' + error.message);
                        }
                    }
                }
            );
        }

        // Factory reset
        function factoryReset() {
            showModal(
                translations[currentLang].confirm_reset,
                async () => {
                    if (SIMULATION_MODE) {
                        document.body.innerHTML = `
                            <div class="container" style="text-align: center; padding-top: 100px;">
                                <div class="spinner" style="width: 48px; height: 48px; border-width: 4px; margin: 0 auto 20px;"></div>
                                <p style="font-size: 16px; color: #1C1C1E;">Resetting...</p>
                            </div>
                        `;
                    } else {
                        try {
                            await fetch('/api/reset', { method: 'POST' });
                            
                            document.body.innerHTML = `
                                <div class="container" style="text-align: center; padding-top: 100px;">
                                    <div class="spinner" style="width: 48px; height: 48px; border-width: 4px; margin: 0 auto 20px;"></div>
                                    <p style="font-size: 16px; color: #1C1C1E;">Resetting...</p>
                                </div>
                            `;
                        } catch (error) {
                            alert('Error: ' + error.message);
                        }
                    }
                }
            );
        }

        // Apply AP settings
        async function applyApSettings() {
            const apSsid = apSsidInput.value;
            const apPassword = apPasswordInput.value;

            if (apSsid.length === 0) {
                alert('AP SSID is required');
                return;
            }

            if (apPassword.length > 0 && apPassword.length < 8) {
                alert('AP password must be at least 8 characters');
                return;
            }

            if (SIMULATION_MODE) {
                showModal(translations[currentLang].success_ap_applied, () => {});
            } else {
                try {
                    const response = await fetch('/api/ap_settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ap_ssid: apSsid, ap_password: apPassword })
                    });
                    const data = await response.json();

                    if (data.success) {
                        showModal(translations[currentLang].success_ap_applied, () => {});
                    } else {
                        alert('Error: ' + data.message);
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Modal
        function showModal(message, onConfirm) {
            modalMessage.textContent = message;
            modalOverlay.classList.add('active');

            modalConfirmBtn.onclick = () => {
                modalOverlay.classList.remove('active');
                onConfirm();
            };

            modalCancelBtn.onclick = () => {
                modalOverlay.classList.remove('active');
            };
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
        });

        fontToggleBtn.addEventListener('click', toggleLargeFont);

        refreshBtn.addEventListener('click', scanNetworks);

        connectBtn.addEventListener('click', connectToNetwork);

        retryBtn.addEventListener('click', retryConnection);

        showPasswordBtn.addEventListener('click', () => togglePassword(passwordInput, showPasswordBtn));

        showApPasswordBtn.addEventListener('click', () => togglePassword(apPasswordInput, showApPasswordBtn));

        saveRebootBtn.addEventListener('click', saveAndReboot);

        factoryResetBtn.addEventListener('click', factoryReset);

        applyApSettingsBtn.addEventListener('click', applyApSettings);

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
