; PlatformIO Project Configuration File
;
; ETL Test Project - тестирование библиотеки Embedded Template Library
; на различных микроконтроллерах ESP8266/ESP32
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
framework = arduino
monitor_speed = 115200
lib_deps = 
    https://github.com/JimorMarlow/ETL
    ; Для локальной отладки раскомментируйте путь к локальной копии
    ; ../ETL
build_flags = 
    '-DWIFI_SSID="mywifissid"'
    '-DWIFI_PASS="mypass"'

; Задачи PlatformIO
extra_scripts = 
    pre:sync_version.py

[env:d1_mini_lite]
platform = espressif8266
board = d1_mini
board_build.filesystem = littlefs
board_build.partitions = littlefs/esp8266_spiffs.csv
build_flags = 
    -D BOARD_WEMOS_D1_MINI
    ${env.build_flags}
    -D PIO_FRAMEWORK_ARDUINO_LITTLEFS_ENABLE
platform_packages = 
    platformio/tool-mkspiffs@^1

[env:esp32c3]
board = esp32-c3-devkitm-1
platform = espressif32
board_build.filesystem = littlefs
board_build.partitions = littlefs/esp32c3_spiffs.csv
; Увеличить размер буфера для LittleFS
board_build.filesystem_size = 0x1F0000
build_flags = 
    -std=gnu++17
    -D BOARD_ESP32_C3_SUPER_MINI
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ${env.build_flags}
    -D ESP32
    -D PIO_FRAMEWORK_ARDUINO_LITTLEFS_ENABLE
    -D CONFIG_LITTLEFS_MAX_PARTITIONS=3
    -D CONFIG_LITTLEFS_PAGE_SIZE=256
    -D CONFIG_LITTLEFS_BLOCK_SIZE=4096
build_unflags = 
    -std=gnu++11
    -Wregister
platform_packages = 
    platformio/tool-mkspiffs@^1

[env:esp32-wroom-32u]
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
board_build.partitions = littlefs/esp32wroom32u_spiffs.csv
upload_speed = 921600
lib_ldf_mode = deep+
build_flags = 
    ${env.build_flags}
    -std=gnu++17
    -D BOARD_HAS_PSRAM
    -D BOARD_ESP32_WROOM_32U
    -D ESP32
build_unflags = 
    -std=gnu++11
    -Wregister
platform_packages = 
    platformio/tool-mkspiffs@^1
